<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Now | Sport Kit Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="glass-nav">
        <nav class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-bolt"></i> SportKit</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="buy-now.html" class="active">Shop</a></li>
                <li><a href="request-form.html">Bulk/Academy</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <button class="hamburger" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
            </div>
        </nav>
    </header>

    <main class="container section-padding">
        <h1 class="text-center">Secure Your Gear</h1>
        
        <div class="grid-2 mt-2">
            <!-- Product Selection -->
            <div class="glass-card">
                <h2>Select Your Kit</h2>
                <form id="order-form" class="mt-1">
                    <div class="form-group">
                        <label for="product">Kit Type</label>
                        <select id="product" class="form-control" required>
                            <option value="0" data-price="0">-- Select Kit --</option>
                            <option value="t20" data-price="45.00">Knight Riders Edition T20 Kit - $45.00</option>
                            <option value="football" data-price="55.00">2026 World Cup Pro Jersey - $55.00</option>
                            <option value="training" data-price="35.00">Elite Training Tracksuit - $35.00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" class="form-control" min="1" max="100" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Customization (+$10)</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="custom-name" value="10">
                            <label for="custom-name">Add Player Name & Number</label>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="glass-card summary-card">
                <h2>Order Summary</h2>
                <div class="summary-details mt-1">
                    <div class="flex-between">
                        <span>Base Price:</span>
                        <span id="summary-base">$0.00</span>
                    </div>
                    <div class="flex-between">
                        <span>Quantity:</span>
                        <span id="summary-qty">x 1</span>
                    </div>
                    <div class="flex-between">
                        <span>Customization:</span>
                        <span id="summary-custom">$0.00</span>
                    </div>
                    <hr>
                    <div class="flex-between total-row">
                        <strong>Total:</strong>
                        <strong id="summary-total" class="text-primary">$0.00</strong>
                    </div>
                </div>
                <button class="btn btn-primary mt-2 full-width" id="checkout-btn">Proceed to Payment</button>
                <p id="checkout-msg" class="success-msg hidden mt-1">Redirecting to secure gateway...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom text-center">
            <p>&copy; 2026 Sport Kit Shop. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
